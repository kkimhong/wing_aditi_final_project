# ---- Shared / Base Configuration ----
spring:
  jackson:
    default-property-inclusion: non_null
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

  application:
    name: company-expense-tracker
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: update
      generate_statistics: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

---
# ============================================================
# DEV Profile — active when: SPRING_PROFILES_ACTIVE=dev
# ============================================================
spring:
  config:
    import: optional:file:.env
    activate:
      on-profile: dev

  datasource:
    url: ${SUPABASE_DB_URL}                      # jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: ${SUPABASE_DB_USER}                # postgres.oirqhgwapzykewevvynq
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_SERVICE_KEY}                   # No fallback — must be explicitly set
  bucket: ${SUPABASE_BUCKET:receipts}            # Bucket name is non-sensitive, fallback OK

logging:
  level:
    com.example: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.stat: DEBUG

---
# ============================================================
# PROD Profile — active when: SPRING_PROFILES_ACTIVE=prod
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SUPABASE_DB_URL}                      # jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: ${SUPABASE_DB_USER}                # postgres.oirqhgwapzykewevvynq
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000           # Catch unreleased connections

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    defer-datasource-initialization: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET}                          # No fallback — must be explicitly set
  expiration: 86400000

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_SERVICE_KEY}                   # No fallback — must be explicitly set
  bucket: ${SUPABASE_BUCKET:receipts}            # Bucket name is non-sensitive, fallback OK

server:
  shutdown: graceful
  tomcat:
    accept-count: 100
    max-connections: 8192

management:
  endpoints:
    web:
      exposure:
        include: health,info                     # ⛔ No metrics endpoint exposed publicly
  endpoint:
    health:
      show-details: when-authorized              # ⛔ Don't expose internals publicly

logging:
  level:
    root: WARN
    com.example: INFO                            # Your app logs at INFO, nothing noisier
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.stat: OFF