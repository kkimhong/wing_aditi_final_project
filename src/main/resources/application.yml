# ---- Shared / Base Configuration ----
spring:
  application:
    name: spring-auth-jwt
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO

---
# ============================================================
# DEV Profile — active when: SPRING_PROFILES_ACTIVE=dev
# ============================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 12345
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true

# Hardcoded JWT secret for local dev only
jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

logging:
  level:
    com.example: DEBUG
    org.hibernate.SQL: DEBUG

---
# ============================================================
# PROD Profile — active when: SPRING_PROFILES_ACTIVE=prod
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    root: WARN
    com.example: INFO