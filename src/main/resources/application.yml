# ---- Shared / Base Configuration ----
spring:
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

  application:
    name: company-expense-tracker
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: update
      generate_statistics: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

---
# ============================================================
# DEV Profile — active when: SPRING_PROFILES_ACTIVE=dev
# ============================================================
spring:
  config:
    import: optional:file:.env
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.oirqhgwapzykewevvynq
    password: postgres@123
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:ihKdPMqqzZRStWHFpAx/u98cZ2bbgBFW9egCDyIOHAU=}
  expiration: 86400000

supabase:
  url: ${SUPABASE_URL:https://oirqhgwapzykewevvynq.supabase.co}
  key: ${SUPABASE_SERVICE_KEY:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pcnFoZ3dhcHp5a2V3ZXZ2eW5xIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDAyNzAyMSwiZXhwIjoyMDg5NjAzMDIxfQ.QygwpbmQr3dWP3JDyEeMBlgv52f7p_sdKdVztpklVC4}
